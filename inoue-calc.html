<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>店舗会計計算</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #121212; color: #eee; padding: 20px; margin: 0; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 20px; max-width: 400px; margin: 0 auto; border: 1px solid #333; }
        h2 { text-align: center; color: #fff; font-size: 18px; margin-bottom: 20px; }
        .section-title { font-size: 12px; color: #888; margin: 20px 0 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .input-group { margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        label { font-size: 14px; flex: 1; }
        .input-wrapper { display: flex; align-items: center; gap: 5px; }
        input[type="number"] { width: 85px; padding: 10px; border: 1px solid #444; border-radius: 10px; text-align: right; font-size: 16px; background: #2a2a2a; color: #fff; -webkit-appearance: none; }
        input[type="checkbox"] { width: 25px; height: 25px; margin: 0; }
        .unit { font-size: 12px; color: #888; width: 35px; }
        
        .toggle-btn { width: 100%; padding: 10px; background: #2c2c2e; color: #32d74b; border: 1px solid #32d74b; border-radius: 10px; font-size: 13px; margin: 10px 0; cursor: pointer; }
        .toggle-btn.active { background: #32d74b; color: #000; }
        #member_list { display: none; margin-top: 10px; }

        /* 決済方法用のスタイル */
        .pay-selector { display: flex; background: #2c2c2e; border-radius: 12px; padding: 4px; margin-top: 10px; }
        .pay-btn { flex: 1; text-align: center; padding: 10px; font-size: 14px; border-radius: 10px; cursor: pointer; color: #aaa; border: none; background: transparent; transition: all 0.2s; }
        .pay-btn.active { background: #32d74b; color: #000; font-weight: bold; }

        .member-row { background: #252525; padding: 8px 12px; border-radius: 10px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        .result-area { margin-top: 15px; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .normal-res { background: #252525; }
        .adj-res { background: #1a2a1a; border-color: #32d74b; margin-top: 20px; }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 8px; color: #aaa; font-size: 14px; }
        .total-row { font-size: 18px; font-weight: bold; color: #fff; border-top: 1px solid #444; padding-top: 10px; margin-top: 5px; display: flex; justify-content: space-between; align-items: baseline; }
        .final-val { color: #32d74b; font-size: 32px; }
        .reset-btn { width: 100%; padding: 15px; background: #3a3a3c; color: #fff; border: none; border-radius: 12px; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="card">
    <h2>スナックバー井上 会計計算機</h2>
    
    <div class="section-title">基本設定</div>
    <div class="input-group">
        <label>合計人数</label>
        <div class="input-wrapper"><input type="number" id="ninzu" placeholder="1" min="1" value="1" oninput="generateMembers()"><span class="unit">名</span></div>
    </div>
    <div class="input-group">
        <label>全員の基本時間</label>
        <div class="input-wrapper"><input type="number" id="base_time" placeholder="0" step="0.5" min="0" oninput="syncTimes()"><span class="unit">h</span></div>
    </div>

    <button id="toggle_btn" class="toggle-btn" onclick="toggleMemberList()" style="display:none;">個別時間を調整する ▼</button>
    <div id="member_list"></div>

    <div class="section-title">プラン選択 (1人/1hあたり)</div>
    <div class="input-group"><label>飲み放題 (3,000円)</label><div class="input-wrapper"><input type="checkbox" id="mode_nomi" onchange="selectPlan('nomi')"></div></div>
    <div class="input-group"><label>ボトル利用 (2,500円)</label><div class="input-wrapper"><input type="checkbox" id="mode_bottle" onchange="selectPlan('bottle')"></div></div>

    <div class="section-title">オーダー</div>
    <div class="input-group"><label>ドリンク (1,000円)</label><div class="input-wrapper"><input type="number" id="drink" placeholder="0" min="0" oninput="calc()"><span class="unit">杯</span></div></div>
    <div class="input-group"><label>ショット (1,200円)</label><div class="input-wrapper"><input type="number" id="shot" placeholder="0" min="0" oninput="calc()"><span class="unit">杯</span></div></div>
    <div class="input-group"><label>炭酸 (500円)</label><div class="input-wrapper"><input type="number" id="tansan" placeholder="0" min="0" oninput="calc()"><span class="unit">本</span></div></div>
    <div class="input-group"><label>ボトル/シャンパン</label><div class="input-wrapper"><input type="number" id="bottle_price" placeholder="0" min="0" oninput="calc()"><span class="unit">円</span></div></div>
    <div class="input-group"><label>その他</label><div class="input-wrapper"><input type="number" id="other" placeholder="0" min="0" oninput="calc()"><span class="unit">円</span></div></div>

    <div class="section-title">決済方法</div>
    <div class="pay-selector">
        <button id="pay_cash" class="pay-btn active" onclick="selectPayment('cash')">現金 (端数切上)</button>
        <button id="pay_card" class="pay-btn" onclick="selectPayment('card')">カード (+10%)</button>
    </div>

    <div class="section-title">本来の計算 (1円単位)</div>
    <div class="result-area normal-res">
        <div class="result-row"><span>小計 (税抜)</span><span id="raw_sub">0円</span></div>
        <div class="result-row"><span>消費税 (10%)</span><span id="raw_tax">0円</span></div>
        <div class="total-row"><span>本来の合計</span><span id="raw_total">0円</span></div>
    </div>

    <div class="section-title" id="adj_title" style="color: #32d74b;">請求用 (端数切上適用)</div>
    <div class="result-area adj-res">
        <div class="result-row"><span id="adj_sub_label">小計 (調整後)</span><span id="adj_sub">0円</span></div>
        <div class="result-row"><span>消費税 (調整後)</span><span id="adj_tax">0円</span></div>
        <div class="total-row"><span>確定合計</span><span id="final_total" class="final-val">0円</span></div>
        <div id="per_person" style="text-align:right; font-size:12px; color:#888; margin-top:5px;">1人あたり: 0円</div>
    </div>

    <button class="reset-btn" onclick="window.location.reload()">入力をリセット</button>
</div>

<script>
    let isIndividualMode = false;
    let paymentMethod = 'cash'; // 'cash' または 'card'

    function selectPlan(type) {
        const nomi = document.getElementById('mode_nomi');
        const bottle = document.getElementById('mode_bottle');

        if (type === 'nomi' && nomi.checked) {
            bottle.checked = false;
        } else if (type === 'bottle' && bottle.checked) {
            nomi.checked = false;
        }
        calc();
    }

    // 決済方法の切り替え
    function selectPayment(method) {
        paymentMethod = method;
        document.getElementById('pay_cash').classList.toggle('active', method === 'cash');
        document.getElementById('pay_card').classList.toggle('active', method === 'card');
        
        // タイトルの文言を動的に変更
        const title = document.getElementById('adj_title');
        const subLabel = document.getElementById('adj_sub_label');
        if (method === 'card') {
            title.innerText = "請求用 (カード手数料10%適用)";
            subLabel.innerText = "小計 (カード調整後)";
        } else {
            title.innerText = "請求用 (端数切上適用)";
            subLabel.innerText = "小計 (調整後)";
        }
        
        calc();
    }

    function toggleMemberList() {
        const list = document.getElementById('member_list');
        const btn = document.getElementById('toggle_btn');
        
        if (list.style.display === 'none' || list.style.display === '') {
            list.style.display = 'block';
            btn.innerText = '個別調整を閉じる ▲';
            btn.classList.add('active');
            isIndividualMode = true;
        } else {
            list.style.display = 'none';
            btn.innerText = '個別時間を調整する ▼';
            btn.classList.remove('active');
            isIndividualMode = false;
            syncTimes();
        }
        calc();
    }

    function generateMembers() {
        const ninzu = parseInt(document.getElementById('ninzu').value) || 1;
        const baseTime = document.getElementById('base_time').value;
        const list = document.getElementById('member_list');
        const btn = document.getElementById('toggle_btn');
        
        if (ninzu <= 1) {
            btn.style.display = 'none';
            list.style.display = 'none';
            isIndividualMode = false;
            list.innerHTML = '';
            calc();
            return;
        }

        btn.style.display = 'block';

        const currentInputs = list.getElementsByClassName('m-time');
        const savedValues = [];
        for (let input of currentInputs) {
            savedValues.push(input.value);
        }

        let html = '';
        for (let i = 1; i <= ninzu; i++) {
            const val = (savedValues[i - 1] !== undefined) ? savedValues[i - 1] : baseTime;
            html += `<div class="member-row"><label>客${i}</label><div class="input-wrapper"><input type="number" class="m-time" value="${val}" placeholder="0" step="0.5" min="0" oninput="calc()"><span class="unit">h</span></div></div>`;
        }
        list.innerHTML = html;
        calc();
    }

    function syncTimes() {
        const baseTime = document.getElementById('base_time').value;
        const memberInputs = document.getElementsByClassName('m-time');
        for (let input of memberInputs) {
            input.value = baseTime;
        }
        calc();
    }

    function calc() {
        let hourlyRate = 0;
        if (document.getElementById('mode_nomi').checked) hourlyRate = 3000;
        if (document.getElementById('mode_bottle').checked) hourlyRate = 2500;

        const ninzu = parseInt(document.getElementById('ninzu').value) || 1;
        let totalHours = 0;

        if (isIndividualMode) {
            const memberInputs = document.getElementsByClassName('m-time');
            for (let input of memberInputs) {
                totalHours += parseFloat(input.value) || 0;
            }
        } else {
            totalHours = (parseFloat(document.getElementById('base_time').value) || 0) * ninzu;
        }

        const baseTotal = totalHours * hourlyRate;
        const drink = (parseFloat(document.getElementById('drink').value) || 0) * 1000;
        const shot = (parseFloat(document.getElementById('shot').value) || 0) * 1200;
        const tansan = (parseFloat(document.getElementById('tansan').value) || 0) * 500;
        const bPrice = parseFloat(document.getElementById('bottle_price').value) || 0;
        const other = parseFloat(document.getElementById('other').value) || 0;

        // 本来の計算 (現金・カード共通のベース)
        const subtotal = baseTotal + drink + shot + tansan + bPrice + other;
        const tax = Math.floor(subtotal * 0.1);
        const rawTotal = subtotal + tax;

        // 確定合計の計算（決済方法による分岐）
        let finalTotal = 0;
        if (paymentMethod === 'card') {
            // カードの場合：本来の合計(税込)にさらに10%を上乗せ（端数切り捨てなし＝1円単位までそのまま）
            finalTotal = rawTotal > 0 ? Math.floor(rawTotal * 1.1) : 0;
        } else {
            // 現金の場合：100円未満切り上げ
            finalTotal = rawTotal > 0 ? Math.ceil(rawTotal / 100) * 100 : 0;
        }
        
        // 確定金額から逆算する内税・小計の按分
        const adjSubtotal = Math.round(finalTotal / 1.1);
        const adjTax = finalTotal - adjSubtotal;
        const perPerson = Math.ceil(finalTotal / ninzu);

        // 画面反映
        document.getElementById('raw_sub').innerText = subtotal.toLocaleString() + "円";
        document.getElementById('raw_tax').innerText = tax.toLocaleString() + "円";
        document.getElementById('raw_total').innerText = rawTotal.toLocaleString() + "円";
        document.getElementById('adj_sub').innerText = adjSubtotal.toLocaleString() + "円";
        document.getElementById('adj_tax').innerText = adjTax.toLocaleString() + "円";
        document.getElementById('final_total').innerText = finalTotal.toLocaleString() + "円";
        document.getElementById('per_person').innerText = "1人あたり: " + perPerson.toLocaleString() + "円";
    }
</script>
</body>
</html>
