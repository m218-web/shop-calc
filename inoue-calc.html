<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>店舗会計計算</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #121212; color: #eee; padding: 20px; margin: 0; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 20px; max-width: 400px; margin: 0 auto; border: 1px solid #333; position: relative; }
        h2 { text-align: center; color: #fff; font-size: 18px; margin-bottom: 20px; }
        .section-title { font-size: 12px; color: #888; margin: 20px 0 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .input-group { margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        label { font-size: 14px; flex: 1; }
        .input-wrapper { display: flex; align-items: center; gap: 5px; }
        input[type="number"], input[type="text"], input[type="time"] { width: 85px; padding: 10px; border: 1px solid #444; border-radius: 10px; text-align: right; font-size: 16px; background: #2a2a2a; color: #fff; -webkit-appearance: none; color-scheme: dark; }
        input[type="time"] { width: 95px; text-align: center; }
        input[type="text"].full-width { width: 100%; text-align: left; box-sizing: border-box; }
        input[type="checkbox"] { width: 25px; height: 25px; margin: 0; }
        .unit { font-size: 12px; color: #888; width: 35px; }
        .time-label { font-size: 11px; color: #888; margin-right: 2px; }

        .toggle-btn { width: 100%; padding: 10px; background: #2c2c2e; color: #32d74b; border: 1px solid #32d74b; border-radius: 10px; font-size: 13px; margin: 10px 0; cursor: pointer; }
        .toggle-btn.active { background: #32d74b; color: #000; }
        #member_list { display: none; margin-top: 10px; }

        .pay-selector { display: flex; background: #2c2c2e; border-radius: 12px; padding: 4px; margin-top: 10px; }
        .pay-btn { flex: 1; text-align: center; padding: 10px; font-size: 14px; border-radius: 10px; cursor: pointer; color: #aaa; border: none; background: transparent; transition: all 0.2s; }
        .pay-btn.active { background: #32d74b; color: #000; font-weight: bold; }

        .member-row { background: #252525; padding: 10px 12px; border-radius: 10px; margin-bottom: 8px; display: block; }
        .member-row-header { display: flex; justify-content: space-between; font-size: 13px; color: #fff; margin-bottom: 8px; font-weight: bold; }
        .member-row-body { display: flex; justify-content: space-between; align-items: center; gap: 5px; }

        .result-area { margin-top: 15px; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .normal-res { background: #252525; }
        .adj-res { background: #1a2a1a; border-color: #32d74b; margin-top: 20px; }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 8px; color: #aaa; font-size: 14px; }
        .total-row { font-size: 18px; font-weight: bold; color: #fff; border-top: 1px solid #444; padding-top: 10px; margin-top: 5px; display: flex; justify-content: space-between; align-items: baseline; }
        .final-val { color: #32d74b; font-size: 32px; }
        
        .save-btn { width: 100%; padding: 12px; background: #007aff; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .reset-btn { width: 100%; padding: 12px; background: #3a3a3c; color: #fff; border: none; border-radius: 12px; font-size: 14px; margin-top: 10px; cursor: pointer; }
        
        #receipt_atena_group { display: none; margin-top: 10px; animation: fadeIn 0.3s ease; }
        
        .alert-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .alert-box { background: #2c2c2e; padding: 25px; border-radius: 15px; max-width: 280px; width: 80%; text-align: center; border: 1px solid #444; animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .alert-msg { font-size: 15px; color: #fff; margin-bottom: 20px; line-height: 1.4; }
        .alert-close-btn { width: 100%; padding: 10px; background: #32d74b; color: #000; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
<div class="card">
    <h2>スナックバー井上 会計計算機</h2>

    <div class="section-title">基本設定</div>
    <div class="input-group">
        <label>合計人数</label>
        <div class="input-wrapper"><input type="number" id="ninzu" placeholder="1" min="1" oninput="generateMembers()"><span class="unit">名</span></div>
    </div>
    
    <div class="input-group">
        <label>全員の入店時間</label>
        <div class="input-wrapper"><input type="time" id="base_in" step="600" onchange="syncTimes('in')"></div>
    </div>
    <div class="input-group">
        <label>全員の退店時間</label>
        <div class="input-wrapper"><input type="time" id="base_out" step="600" onchange="syncTimes('out')"></div>
    </div>

    <button id="toggle_btn" class="toggle-btn" onclick="toggleMemberList()" style="display:none;">個別時間を調整する ▼</button>
    <div id="member_list"></div>

    <div class="section-title">プラン選択 (1人/1hあたり)</div>
    <div class="input-group"><label>飲み放題 (3,000円)</label><div class="input-wrapper"><input type="checkbox" id="mode_nomi" onchange="selectPlan('nomi')"></div></div>
    <div class="input-group"><label>ボトル利用 (2,500円)</label><div class="input-wrapper"><input type="checkbox" id="mode_bottle" onchange="selectPlan('bottle')"></div></div>

    <div class="section-title">オーダー</div>
    <div class="input-group"><label>ドリンク (1,000円)</label><div class="input-wrapper"><input type="number" id="drink" placeholder="0" min="0" oninput="calc()"><span class="unit">杯</span></div></div>
    <div class="input-group"><label>ショット (1,200円)</label><div class="input-wrapper"><input type="number" id="shot" placeholder="0" min="0" oninput="calc()"><span class="unit">杯</span></div></div>
    <div class="input-group"><label>炭酸 (500円)</label><div class="input-wrapper"><input type="number" id="tansan" placeholder="0" min="0" oninput="calc()"><span class="unit">本</span></div></div>
    <div class="input-group"><label>ボトル/シャンパン</label><div class="input-wrapper"><input type="number" id="bottle_price" placeholder="0" min="0" oninput="calc()"><span class="unit">円</span></div></div>
    <div class="input-group"><label>その他</label><div class="input-wrapper"><input type="number" id="other" placeholder="0" min="0" oninput="calc()"><span class="unit">円</span></div></div>

    <div class="section-title">本来の計算 (1円単位)</div>
    <div class="result-area normal-res">
        <div class="result-row"><span>小計 (税抜)</span><span id="raw_sub">0円</span></div>
        <div class="result-row"><span>消費税 (10%)</span><span id="raw_tax">0円</span></div>
        <div class="total-row"><span>本来の合計</span><span id="raw_total">0円</span></div>
    </div>

    <div class="section-title">決済方法</div>
    <div class="pay-selector">
        <button id="pay_cash" class="pay-btn active" onclick="selectPayment('cash')">現金 (端数切上)</button>
        <button id="pay_card" class="pay-btn" onclick="selectPayment('card')">カード (+10%)</button>
    </div>

    <div class="section-title" id="adj_title" style="color: #32d74b;">請求用 (端数切上適用)</div>
    <div class="result-area adj-res">
        <div class="result-row"><span id="adj_sub_label">小計 (調整後)</span><span id="adj_sub">0円</span></div>
        <div class="result-row"><span>消費税 (調整後)</span><span id="adj_tax">0円</span></div>
        <div class="total-row"><span>確定合計</span><span id="final_total" class="final-val">0円</span></div>
        <div id="per_person" style="text-align:right; font-size:12px; color:#888; margin-top:5px;">1人あたり: 0円</div>
    </div>

    <div class="section-title">オプション</div>
    <div class="input-group">
        <label>領収書</label>
        <div class="input-wrapper"><input type="checkbox" id="need_receipt" onchange="toggleReceiptAtena()"></div>
    </div>
    <div id="receipt_atena_group">
        <div class="input-group">
            <label>宛名</label>
            <input type="text" id="receipt_atena" class="full-width" placeholder="宛名を入力（必須）">
        </div>
    </div>

    <button class="save-btn" onclick="checkAndSaveImage()">計算結果を画像保存</button>
    <button class="reset-btn" onclick="window.location.reload()">入力をリセット</button>
</div>

<div id="custom_alert" class="alert-overlay">
    <div class="alert-box">
        <div class="alert-msg">ダウンロードに保存ができました。</div>
        <button class="alert-close-btn" onclick="closeAlert()">閉じる</button>
    </div>
</div>

<script>
    let isIndividualMode = false;
    let paymentMethod = 'cash';
    let inputCustomerName = ""; 

    window.onload = function() {
        const now = new Date();
        let m = Math.floor(now.getMinutes() / 10) * 10;
        now.setMinutes(m);
        const formatTime = (d) => String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
        
        document.getElementById('base_in').value = formatTime(now);
        now.setHours(now.getHours() + 1);
        document.getElementById('base_out').value = formatTime(now);
        calc();
    }

    function selectPlan(type) {
        const nomi = document.getElementById('mode_nomi');
        const bottle = document.getElementById('mode_bottle');
        if (type === 'nomi' && nomi.checked) bottle.checked = false;
        else if (type === 'bottle' && bottle.checked) nomi.checked = false;
        calc();
    }

    function selectPayment(method) {
        paymentMethod = method;
        document.getElementById('pay_cash').classList.toggle('active', method === 'cash');
        document.getElementById('pay_card').classList.toggle('active', method === 'card');
        
        const title = document.getElementById('adj_title');
        const subLabel = document.getElementById('adj_sub_label');
        if (method === 'card') {
            title.innerText = "請求用 (端数調整後 + カード10%)";
            subLabel.innerText = "小計 (カード調整後)";
        } else {
            title.innerText = "請求用 (端数切上適用)";
            subLabel.innerText = "小計 (調整後)";
        }
        calc();
    }

    function toggleReceiptAtena() {
        const checkbox = document.getElementById('need_receipt');
        const group = document.getElementById('receipt_atena_group');
        group.style.display = checkbox.checked ? 'block' : 'none';
    }

    function toggleMemberList() {
        const list = document.getElementById('member_list');
        const btn = document.getElementById('toggle_btn');
        if (list.style.display === 'none' || list.style.display === '') {
            list.style.display = 'block';
            btn.innerText = '個別調整を閉じる ▲';
            btn.classList.add('active');
            isIndividualMode = true;
        } else {
            list.style.display = 'none';
            btn.innerText = '個別時間を調整する ▼';
            btn.classList.remove('active');
            isIndividualMode = false;
            syncTimes('all');
        }
        calc();
    }

    function generateMembers() {
        const ninzu = parseInt(document.getElementById('ninzu').value) || 1;
        const baseIn = document.getElementById('base_in').value;
        const baseOut = document.getElementById('base_out').value;
        const list = document.getElementById('member_list');
        const btn = document.getElementById('toggle_btn');
        
        if (ninzu <= 1) {
            btn.style.display = 'none';
            list.style.display = 'none';
            isIndividualMode = false;
            list.innerHTML = '';
            calc();
            return;
        }
        btn.style.display = 'block';

        const currentInputsIn = list.getElementsByClassName('m-in');
        const currentInputsOut = list.getElementsByClassName('m-out');
        const savedIn = [];
        const savedOut = [];
        for (let input of currentInputsIn) savedIn.push(input.value);
        for (let input of currentInputsOut) savedOut.push(input.value);

        let html = '';
        for (let i = 1; i <= ninzu; i++) {
            const valIn = (savedIn[i - 1] !== undefined) ? savedIn[i - 1] : baseIn;
            const valOut = (savedOut[i - 1] !== undefined) ? savedOut[i - 1] : baseOut;
            html += `
                <div class="member-row">
                    <div class="member-row-header"><span>客${i}</span><span id="m_calc_time_${i}" style="color:#32d74b; font-size:12px;"></span></div>
                    <div class="member-row-body">
                        <span class="time-label">入</span><input type="time" class="m-in" value="${valIn}" step="600" onchange="calc()">
                        <span class="time-label" style="margin-left:5px;">出</span><input type="time" class="m-out" value="${valOut}" step="600" onchange="calc()">
                    </div>
                </div>`;
        }
        list.innerHTML = html;
        calc();
    }

    function syncTimes(type) {
        const baseIn = document.getElementById('base_in').value;
        const baseOut = document.getElementById('base_out').value;
        
        const memberIn = document.getElementsByClassName('m-in');
        const memberOut = document.getElementsByClassName('m-out');
        
        if (type === 'in' || type === 'all') {
            for (let input of memberIn) input.value = baseIn;
        }
        if (type === 'out' || type === 'all') {
            for (let input of memberOut) input.value = baseOut;
        }
        calc();
    }

    // ★ 30分切り上げを廃止し、分単位からストレートにh数を算出する（1時間10分 ➔ 1.1666...h）
    function computeBillableHours(timeIn, timeOut) {
        if (!timeIn || !timeOut) return 0;
        
        const [inH, inM] = timeIn.split(':').map(Number);
        const [outH, outM] = timeOut.split(':').map(Number);
        
        let diffMinutes = (outH * 60 + outM) - (inH * 60 + inM);
        
        if (diffMinutes <= 0) {
            diffMinutes += 24 * 60; 
        }
        
        return diffMinutes / 60;
    }

    let gData = {};

    function calc() {
        let hourlyRate = 0;
        let planName = "未選択";
        if (document.getElementById('mode_nomi').checked) { hourlyRate = 3000; planName = "飲み放題"; }
        if (document.getElementById('mode_bottle').checked) { hourlyRate = 2500; planName = "ボトル利用"; }

        const ninzu = parseInt(document.getElementById('ninzu').value) || 1;
        let totalBillableHours = 0;
        let timeDetailsLog = "";

        if (isIndividualMode) {
            const memberIn = document.getElementsByClassName('m-in');
            const memberOut = document.getElementsByClassName('m-out');
            
            for (let i = 0; i < memberIn.length; i++) {
                const h = computeBillableHours(memberIn[i].value, memberOut[i].value);
                totalBillableHours += h;
                
                const indicator = document.getElementById(`m_calc_time_${i+1}`);
                if (indicator) indicator.innerText = `${memberIn[i].value}～${memberOut[i].value} (${Math.round(h * 60)}分)`;
            }
            timeDetailsLog = `個別調整 (計 ${Math.round(totalBillableHours * 60)}分)`;
        } else {
            const baseIn = document.getElementById('base_in').value;
            const baseOut = document.getElementById('base_out').value;
            const singlePersonHours = computeBillableHours(baseIn, baseOut);
            totalBillableHours = singlePersonHours * ninzu;
            timeDetailsLog = `${baseIn}～${baseOut} (1人:${Math.round(singlePersonHours * 60)}分 ➔ 計:${Math.round(totalBillableHours * 60)}分)`;
        }

        const baseTotal = totalBillableHours * hourlyRate;
        const drinkCount = parseFloat(document.getElementById('drink').value) || 0;
        const shotCount = parseFloat(document.getElementById('shot').value) || 0;
        const tansanCount = parseFloat(document.getElementById('tansan').value) || 0;
        const bPrice = parseFloat(document.getElementById('bottle_price').value) || 0;
        const otherPrice = parseFloat(document.getElementById('other').value) || 0;

        const subtotal = baseTotal + (drinkCount * 1000) + (shotCount * 1200) + (tansanCount * 500) + bPrice + otherPrice;
        const tax = Math.floor(subtotal * 0.1);
        const rawTotal = subtotal + tax;

        const cashAdjustedTotal = rawTotal > 0 ? Math.ceil(rawTotal / 100) * 100 : 0;

        let finalTotal = 0;
        if (paymentMethod === 'card') {
            finalTotal = cashAdjustedTotal > 0 ? Math.floor(cashAdjustedTotal * 1.1) : 0;
        } else {
            finalTotal = cashAdjustedTotal;
        }
        
        const adjSubtotal = Math.round(finalTotal / 1.1);
        const adjTax = finalTotal - adjSubtotal;
        const perPerson = Math.ceil(finalTotal / ninzu);

        document.getElementById('raw_sub').innerText = subtotal.toLocaleString() + "円";
        document.getElementById('raw_tax').innerText = tax.toLocaleString() + "円";
        document.getElementById('raw_total').innerText = rawTotal.toLocaleString() + "円";
        document.getElementById('adj_sub').innerText = adjSubtotal.toLocaleString() + "円";
        document.getElementById('adj_tax').innerText = adjTax.toLocaleString() + "円";
        document.getElementById('final_total').innerText = finalTotal.toLocaleString() + "円";
        document.getElementById('per_person').innerText = "1人あたり: " + perPerson.toLocaleString() + "円";

        gData = {
            ninzu: ninzu,
            plan: planName,
            hoursText: timeDetailsLog,
            drink: drinkCount,
            shot: shotCount,
            tansan: tansanCount,
            bottle: bPrice,
            other: otherPrice,
            rawSub: subtotal,
            rawTax: tax,
            rawTotal: rawTotal,
            final: finalTotal,
            sub: adjSubtotal,
            tax: adjTax,
            pay: paymentMethod === 'card' ? "クレジットカード" : "現金"
        };
    }

    function getBusinessDate() {
        const now = new Date();
        const hours = now.getHours();
        if (hours < 8) {
            now.setDate(now.getDate() - 1);
        }
        return {
            string: `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日`,
            shortString: `${now.getMonth() + 1}${now.getDate()}`
        };
    }

    function checkAndSaveImage() {
        calc();
        const payName = paymentMethod === 'card' ? "【 クレジットカード 】" : "【 現金 】";
        
        if (confirm(`決済方法は ${payName} でお間違いないですか？`)) {
            const name = prompt("会計されたお客様名を入力してください。");
            if (name === null) return;
            inputCustomerName = name.trim();
            
            saveAsImage();
            document.getElementById('custom_alert').style.display = 'flex';
        } else {
            alert("決済方法を再選択してください。");
        }
    }

    function closeAlert() {
        document.getElementById('custom_alert').style.display = 'none';
    }

    function saveAsImage() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 440;
        canvas.height = 760;
        
        ctx.fillStyle = '#121212';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#1e1e1e';
        ctx.fillRect(20, 20, 400, 720);
        ctx.strokeStyle = '#333333';
        ctx.lineWidth = 1;
        ctx.strokeRect(20, 20, 400, 720);
        
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('スナックバー井上 会計明細', 220, 55);
        
        function drawSectionTitle(text, y) {
            ctx.textAlign = 'left';
            ctx.fillStyle = '#888888';
            ctx.font = '12px sans-serif';
            ctx.fillText(text, 40, y);
            ctx.strokeStyle = '#333333';
            ctx.beginPath(); ctx.moveTo(40, y + 6); ctx.lineTo(400, y + 6); ctx.stroke();
        }
        
        function drawRow(label, value, y, valColor = '#ffffff') {
            ctx.textAlign = 'left';
            ctx.fillStyle = '#aaaaaa';
            ctx.font = '14px sans-serif';
            ctx.fillText(label, 40, y);
            ctx.textAlign = 'right';
            ctx.fillStyle = valColor;
            ctx.fillText(value, 400, y);
        }

        let currentY = 95;
        const bizDate = getBusinessDate();

        drawSectionTitle('ご利用情報', currentY); currentY += 28;
        const displayName = inputCustomerName ? inputCustomerName + "様" : "（未入力）";
        drawRow('お名前', displayName, currentY); currentY += 25;
        drawRow('ご利用日', bizDate.string, currentY); currentY += 35;
        
        drawSectionTitle('基本設定 / プラン', currentY); currentY += 28;
        drawRow('合計人数', `${gData.ninzu} 名`, currentY); currentY += 25;
        drawRow('プラン / 時間', `${gData.plan}`, currentY); currentY += 22;
        ctx.textAlign = 'right'; ctx.fillStyle = '#fff'; ctx.font = '11px sans-serif';
        ctx.fillText(gData.hoursText, 400, currentY); currentY += 35;
        
        drawSectionTitle('オーダー明細', currentY); currentY += 28;
        drawRow('ドリンク', `${gData.drink} 杯`, currentY); currentY += 25;
        drawRow('ショット', `${gData.shot} 杯`, currentY); currentY += 25;
        drawRow('炭酸', `${gData.tansan} 本`, currentY); currentY += 25;
        drawRow('ボトル / シャンパン', `${gData.bottle.toLocaleString()} 円`, currentY); currentY += 25;
        drawRow('その他', `${gData.other.toLocaleString()} 円`, currentY); currentY += 35;
        
        drawSectionTitle('本来の計算 (1円単位)', currentY); currentY += 28;
        drawRow('小計 (税抜)', `${gData.rawSub.toLocaleString()}円`, currentY); currentY += 25;
        drawRow('消費税 (10%)', `${gData.rawTax.toLocaleString()}円`, currentY); currentY += 25;
        drawRow('本来の合計', `${gData.rawTotal.toLocaleString()}円`, currentY); currentY += 35;
        
        drawSectionTitle('決済方法', currentY); currentY += 28;
        ctx.fillStyle = '#32d74b';
        ctx.fillRect(40, currentY - 15, 360, 32);
        ctx.fillStyle = '#000000';
        ctx.font = 'bold 14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(gData.pay + (paymentMethod === 'card' ? ' (+10%)' : ' (端数切上)'), 220, currentY + 6);
        currentY += 45;
        
        const titleText = paymentMethod === 'card' ? "請求用 (端数調整後 + カード10%)" : "請求用 (端数切上適用)";
        drawSectionTitle(titleText, currentY); currentY += 32;
        
        drawRow('小計 (調整後)', `${gData.sub.toLocaleString()}円`, currentY); currentY += 25;
        drawRow('消費税 (調整後)', `${gData.tax.toLocaleString()}円`, currentY); currentY += 35;
        
        ctx.strokeStyle = '#444444';
        ctx.beginPath(); ctx.moveTo(40, currentY - 15); ctx.lineTo(400, currentY - 15); ctx.stroke();
        
        ctx.textAlign = 'left';
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 18px sans-serif';
        ctx.fillText('確定合計', 40, currentY + 12);
        
        ctx.textAlign = 'right';
        ctx.fillStyle = '#32d74b';
        ctx.font = 'bold 32px sans-serif';
        ctx.fillText(`${gData.final.toLocaleString()}円`, 400, currentY + 15);
        
        ctx.textAlign = 'right';
        ctx.fillStyle = '#888888';
        ctx.font = '12px sans-serif';
        ctx.fillText(`1人あたり: ${Math.ceil(gData.final / gData.ninzu).toLocaleString()}円`, 400, currentY + 38);

        const now = new Date();
        const fileRawName = inputCustomerName || "未入力";
        const safeName = fileRawName.replace(/[/\\?%*:|"<>]/g, '-');
        const filename = `会計明細_${safeName}_${bizDate.shortString}_${now.getHours()}${now.getMinutes()}.png`;
        
        const link = document.createElement('a');
        link.download = filename;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>
</body>
</html>
